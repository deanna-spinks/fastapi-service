[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=80",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests that test multiple components together",
    "performance: Performance tests that measure response times and resource usage",
    "slow: Tests that take longer to run"
]
asyncio_mode = "auto"

[tool.isort]
profile = "black"
line_length = 88
